apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamsphere-app
  namespace: streamsphere
spec:
  replicas: 3
  selector:
    matchLabels:
      app: streamsphere-app
  template:
    metadata:
      labels:
        app: streamsphere-app
    spec:
      containers:
      - name: streamsphere-app
        image: streamsphere:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: streamsphere-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: streamsphere-service
  namespace: streamsphere
spec:
  selector:
    app: streamsphere-app
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamsphere-ingress
  namespace: streamsphere
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - streamsphere.example.com
    secretName: streamsphere-tls
  rules:
  - host: streamsphere.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: streamsphere-service
            port:
              number: 80
